<script>
  // Build a URL → bundled-blob-URL map so JSX strings keep working unchanged.
  // No-op in dev (window.__resources is empty); populated in standalone build.
  (function () {
    const map = {};
    document.querySelectorAll('meta[name="ext-resource-dependency"][data-resource-id]').forEach(m => {
      const url = m.getAttribute("content");
      const id  = m.getAttribute("data-resource-id");
      if (url && id && window.__resources && window.__resources[id]) map[url] = window.__resources[id];
    });
    window.__photoByUrl = map;
  })();
</script>
