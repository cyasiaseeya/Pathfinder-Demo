<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ark Academy · Parent Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pretendard+Variable:wght@300..700&family=Noto+Serif+KR:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400;1,8..60,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css" />

<link rel="stylesheet" href="assets/brand-fonts.css" />
<link rel="stylesheet" href="styles/tokens.css" />
<link rel="stylesheet" href="styles/components.css" />
<link rel="stylesheet" href="styles/parent.css" />

<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: #f0eee9; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="parent/shared.jsx"></script>
<script type="text/babel" src="parent/home.jsx"></script>
<script type="text/babel" src="parent/child.jsx"></script>
<script type="text/babel" src="parent/projects.jsx"></script>
<script type="text/babel" src="parent/facilitator.jsx"></script>
<script type="text/babel" src="parent/next.jsx"></script>
<script type="text/babel" src="parent/letter.jsx"></script>
<script type="text/babel" src="parent/unlock.jsx"></script>
<script type="text/babel" src="parent/scrapbook.jsx"></script>
<script type="text/babel" src="parent/wall.jsx"></script>
<script type="text/babel" src="parent/conference.jsx"></script>
<script type="text/babel" src="parent/desktop.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "tod": "evening",
  "hero": "audio",
  "notif": "calm",
  "activeKid": "minjun",
  "multiKid": true,
  "tooltip": true,
  "shareOpen": false
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.documentElement.dataset.theme = tweaks.theme;
  }, [tweaks.theme]);

  const phoneW = 460, phoneH = 900;

  // Render a phone artboard pair (KR | EN) of any screen.
  // Each pair gets its own PPRouter so navigation is independent.
  // NOTE: returns an ARRAY (not a Fragment) so DesignCanvas's
  // React.Children.forEach walks both artboards as direct section children.
  const Pair = ({ initial, idBase, label, extra = {} }) => [
    <DCArtboard key={idBase + "-kr"} id={idBase + "-kr"} label={label + " · 한국어"} width={phoneW} height={phoneH}>
      <div data-lang="kr" style={{ width:'100%', height:'100%' }} className="ark-app">
        <PhoneShell>
          <PPRouter
            initial={initial}
            initialKid={tweaks.activeKid}
            tod={tweaks.tod}
            heroVariant={tweaks.hero}
            notif={tweaks.notif}
            tooltipOn={tweaks.tooltip}
            multiKid={tweaks.multiKid}
            {...extra}
          />
        </PhoneShell>
      </div>
    </DCArtboard>,
    <DCArtboard key={idBase + "-en"} id={idBase + "-en"} label={label + " · English"} width={phoneW} height={phoneH}>
      <div data-lang="en" style={{ width:'100%', height:'100%' }} className="ark-app">
        <PhoneShell>
          <PPRouter
            initial={initial}
            initialKid={tweaks.activeKid}
            tod={tweaks.tod}
            heroVariant={tweaks.hero}
            notif={tweaks.notif}
            tooltipOn={tweaks.tooltip}
            multiKid={tweaks.multiKid}
            {...extra}
          />
        </PhoneShell>
      </div>
    </DCArtboard>,
  ];

  return (
    <div className="ark-app">
      <DesignCanvas>
        <DCSection
          id="overview"
          title="Ark Academy · Parent Portal"
          subtitle="A 10-second reassurance surface for Korean parents. Mobile-first, KR primary. Each screen is rendered twice — KR primary | EN primary — so reviewers can read both sides.">

          <DCArtboard id="design-note" label="Design notes" width={520} height={900}>
            <div style={{
              padding: '36px 36px 28px',
              fontFamily: 'var(--sans)',
              color: 'var(--ink)', background: 'var(--paper)',
              height: '100%', overflow: 'auto',
            }}>
              <div className="eyebrow" style={{ marginBottom: 14 }}>
                <span className="dot" />
                <span className="mono">PARENT PORTAL · v.1</span>
              </div>
              <h2 style={{
                fontFamily: 'var(--sans)', fontWeight: 600,
                fontSize: 28, letterSpacing: '-0.028em', lineHeight: 1.2,
                margin: '0 0 14px',
              }}>
                A <em style={{ fontStyle: 'normal', fontWeight: 700, color: 'var(--violet)' }}>postcard</em>, not a dashboard.
              </h2>
              <p style={{ fontSize: 13, lineHeight: 1.55, color: 'var(--ink-2)', margin: '0 0 14px' }}>
                The Parent Portal sits in the same visual family as the Student Portal (warm paper, Noto Serif voice, sumi-ink accents) but in a softer register: more whitespace, gentler gradients, fewer hard rules. It is built for a Korean mother checking on her phone in 30-second windows.
              </p>
              <p style={{ fontSize: 13, lineHeight: 1.55, color: 'var(--ink-2)', margin: '0 0 22px' }}>
                Bilingual is structural — every string is wired through <span className="mono" style={{ fontSize: 12 }}>&lt;Bil kr en&gt;</span>. Each screen below appears in two artboards: <strong>한국어 primary</strong> on the left, <strong>English primary</strong> on the right.
              </p>

              <h3 className="mono" style={{ fontSize: 11, letterSpacing: '.18em', color: 'var(--muted)', margin: '0 0 10px' }}>SYSTEM CHOICES</h3>
              <ul style={{ fontSize: 13, lineHeight: 1.6, color: 'var(--ink-2)', paddingLeft: 18, margin: '0 0 22px' }}>
                <li>No streaks · no points · no leaderboards. No red anywhere.</li>
                <li>Coral is reserved for facilitator accents and growth highlights.</li>
                <li>Project artifacts are the imagery — never stock photos.</li>
                <li>Arketype radar is rendered as a soft gradient blob, no clinical grid.</li>
                <li>Sibling switcher only surfaces when a second child exists.</li>
                <li>Time-of-day shifts background wash on the greeting (morning butter / evening lilac).</li>
              </ul>

              <h3 className="mono" style={{ fontSize: 11, letterSpacing: '.18em', color: 'var(--muted)', margin: '0 0 10px' }}>SCREENS</h3>
              <ol style={{ fontSize: 13, lineHeight: 1.7, color: 'var(--ink-2)', paddingLeft: 18, margin: 0 }}>
                <li>Home — the 10-second reassurance screen, with 3 hero variants.</li>
                <li>My Child — soft Arketype radar + plain-language interpretation.</li>
                <li>Projects — timeline of artifacts + share-card sheet.</li>
                <li>Facilitator — message thread with inline KR↔EN translation.</li>
                <li>What's next — active project + how to support without taking over.</li>
                <li>Friday Letter — weekly letter from the mentor, sticky-note hand-line.</li>
                <li>Unlock Invitation — family RSVP for the ceremony.</li>
                <li>Year Scrapbook — novel: the year as a scrolling document.</li>
                <li>Family Wall — novel: extended family leaves one-line / six-second notes.</li>
                <li>1:1 Conference — booking a private window with the mentor.</li>
                <li>Desktop Home — 1024-wide dashboard view of screen 01.</li>
              </ol>
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="prototype" title="Clickable prototype" subtitle="Each phone is a fully wired router. Tap the bottom nav, hero card, project cards, child switcher — every surface routes. The same prototype is mirrored 한국어 | English.">
          {Pair({ initial:"home", idBase:"proto", label:"Parent prototype" })}
        </DCSection>

        <DCSection id="home" title="01 · Home — entry" subtitle="The 10-second reassurance screen. Tap the hero card or any project to drill in.">
          {Pair({ initial:"home", idBase:"home", label:"01 · Home" })}
        </DCSection>

        <DCSection id="child" title="02 · My Child — entry" subtitle="Soft Arketype radar over plain-language interpretation. The 'see the data' drawer is one tap.">
          {Pair({ initial:"child", idBase:"child", label:"02 · My Child" })}
        </DCSection>

        <DCSection id="projects" title="03 · Projects — entry" subtitle="Tap any project card to open the editorial share sheet.">
          {Pair({ initial:"projects", idBase:"proj", label:"03 · Projects" })}
          <DCArtboard id="proj-share" label="03b · Share sheet · open" width={phoneW} height={phoneH}>
            <div data-lang="kr" style={{ width:'100%', height:'100%' }} className="ark-app">
              <PhoneShell>
                <PPRouter initial="projects" initialKid={tweaks.activeKid} tod={tweaks.tod} heroVariant={tweaks.hero} notif={tweaks.notif} tooltipOn={tweaks.tooltip} multiKid={tweaks.multiKid} shareOpen={true} />
              </PhoneShell>
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="msg" title="04 · Facilitator — entry" subtitle="Direct line to the facilitator with one-tap KR↔EN translation on every message.">
          {Pair({ initial:"msg", idBase:"fac", label:"04 · Facilitator" })}
        </DCSection>

        <DCSection id="next" title="05 · What's next — entry" subtitle="The 'stay out of the way' screen — what to expect and how to support without taking over.">
          {Pair({ initial:"next", idBase:"next", label:"05 · What's next" })}
        </DCSection>

        <DCSection id="letter" title="06 · Friday Letter" subtitle="The weekly letter from the mentor — parent-side of the Teacher Portal's Parent Bridge. The mentor's hand-added line is called out on a sticky note, and one tap opens the reply thread.">
          {Pair({ initial:"letter", idBase:"letter", label:"06 · Friday Letter" })}
        </DCSection>

        <DCSection id="unlock" title="07 · Unlock Invitation" subtitle="The family is invited to the kid's unlock ceremony. RSVP, what to expect, and what role the parent plays — a gentle 'be the listener' brief.">
          {Pair({ initial:"unlock", idBase:"unlock", label:"07 · Unlock invite" })}
        </DCSection>

        <DCSection id="scrapbook" title="08 · Year Scrapbook · novel" subtitle="The kid's year as a scrolling document. A spine of months, projects, audio memos, drawings, and the unlock moments — designed to feel like turning pages of a kept book, not a feed.">
          {Pair({ initial:"scrapbook", idBase:"scrap", label:"08 · Year scrapbook" })}
        </DCSection>

        <DCSection id="wall" title="09 · Family Wall · novel" subtitle="A private noticeboard where grandparents, siblings, cousins leave a six-second voice note, a single line, or a photo. No threading, no comments-on-comments — the kid reads them all together on Friday evening.">
          {Pair({ initial:"wall", idBase:"wall", label:"09 · Family wall" })}
        </DCSection>

        <DCSection id="conference" title="10 · 1:1 Conference" subtitle="Booking a private window with the mentor. Open windows are shown as warm slots with what each one is best for — morning brief check-in, after-school longer talk, etc. The last meeting's one-sentence summary anchors continuity.">
          {Pair({ initial:"conference", idBase:"conf", label:"10 · 1:1 Conference" })}
        </DCSection>

        <DCSection id="desktop" title="Desktop Home · 1024" subtitle="The Home screen at desktop width. Same content, different rhythm — radar pinned to the rail, hero stretched.">
          <DCArtboard id="desk-kr" label="Desktop Home · 한국어" width={1024} height={760}>
            <div data-lang="kr" style={{ width:'100%', height:'100%' }} className="ark-app">
              <PPDesktopHome tod={tweaks.tod} />
            </div>
          </DCArtboard>
          <DCArtboard id="desk-en" label="Desktop Home · English" width={1024} height={760}>
            <div data-lang="en" style={{ width:'100%', height:'100%' }} className="ark-app">
              <PPDesktopHome tod={tweaks.tod} />
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="extras" title="Extras" subtitle="States and exports the brief asked for: weekend quiet state, notification preferences, and a print-friendly progress note for grandparents.">
          <DCArtboard id="quiet-kr" label="Quiet state · 일요일" width={phoneW} height={phoneH}>
            <div data-lang="kr" style={{ width:'100%', height:'100%' }} className="ark-app">
              <PhoneShell><PPHomeQuiet activeKid={tweaks.activeKid} /></PhoneShell>
            </div>
          </DCArtboard>
          <DCArtboard id="prefs-kr" label="Notification prefs · 한국어" width={phoneW} height={phoneH}>
            <div data-lang="kr" style={{ width:'100%', height:'100%' }} className="ark-app">
              <PhoneShell><PPPrefs activeKid={tweaks.activeKid} /></PhoneShell>
            </div>
          </DCArtboard>
          <DCArtboard id="tooltip-en" label="Radar onboarding · tooltip" width={phoneW} height={phoneH}>
            <div data-lang="en" style={{ width:'100%', height:'100%' }} className="ark-app">
              <PhoneShell>
                <PPRouter initial="child" initialKid={tweaks.activeKid} tooltipOn={true} multiKid={tweaks.multiKid} />
              </PhoneShell>
            </div>
          </DCArtboard>
          <DCArtboard id="print-en" label="Print-friendly note · grandparents" width={620} height={820}>
            <div data-lang="en" style={{ width:'100%', height:'100%' }} className="ark-app">
              <PPPrint />
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Language">
          <p style={{ fontSize: 11, color: '#888', margin: '0 0 6px', lineHeight: 1.5 }}>
            Each screen is rendered KR | EN side-by-side. Toggle live-language inside individual artboards via <span style={{ fontFamily: 'monospace' }}>data-lang</span> if needed.
          </p>
        </TweakSection>
        <TweakSection title="Visual register">
          <TweakRadio label="Theme" value={tweaks.theme} onChange={v => setTweak("theme", v)}
            options={[{ value: "light", label: "Light · paper" }, { value: "dark", label: "Dark · violet" }]} />
        </TweakSection>
        <TweakSection title="Home · time of day">
          <TweakRadio label="Greeting wash" value={tweaks.tod} onChange={v => setTweak("tod", v)}
            options={[{ value: "morning", label: "Morning · butter" }, { value: "evening", label: "Evening · lilac" }]} />
        </TweakSection>
        <TweakSection title="Home · hero moment">
          <TweakRadio label="Variant" value={tweaks.hero} onChange={v => setTweak("hero", v)}
            options={[
              { value: "audio", label: "30s audio clip" },
              { value: "drawing", label: "Sketch artifact" },
              { value: "quote", label: "Pulled quote" },
            ]} />
        </TweakSection>
        <TweakSection title="Notification state">
          <TweakRadio label="Inbox" value={tweaks.notif} onChange={v => setTweak("notif", v)}
            options={[
              { value: "calm", label: "Calm" },
              { value: "unread", label: "Unread message" },
              { value: "question", label: "Question for parent" },
            ]} />
        </TweakSection>
        <TweakSection title="Child switcher · sibling demo">
          <TweakRadio label="Active" value={tweaks.activeKid} onChange={v => setTweak("activeKid", v)}
            options={[
              { value: "minjun", label: "민준 · G5" },
              { value: "seoyeon", label: "서연 · G3" },
            ]} />
          <TweakToggle label="Show sibling pill" value={tweaks.multiKid} onChange={v => setTweak("multiKid", v)} />
        </TweakSection>
        <TweakSection title="Onboarding tooltip">
          <TweakToggle label="Radar tooltip · My Child" value={tweaks.tooltip} onChange={v => setTweak("tooltip", v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
